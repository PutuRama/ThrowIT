<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Web Bank Sampah</title>
        <link rel="shortcut icon" href="asset/img/logo/ThrowIT_logo_without_text.png" type="image/x-icon" />
        <link rel="stylesheet" href="asset/plugin/bootstrap/dist/css/bootstrap.min.css" />
        <link rel="stylesheet" href="asset/plugin/boxicon/fonts/basic/boxicons.min.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
        <link rel="stylesheet" href="asset/plugin/fontawesome/css/all.min.css" />
        <link rel="stylesheet" href="css/custom.css" />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body class="container my-auto">
        <div class="row justify-content-center align-items-center" style="min-height: 100dvh">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <div class="page__login bg-white rounded-3 py-4 px-5">
                    <div class="back">
                        <a href="index.html" class="text-success"
                            ><i class="fas far fa-arrow-alt-circle-left fs-2"></i
                        ></a>
                    </div>
                    <div class="title__login d-flex justify-content-center align-items-center flex-column mb-5">
                        <img style="width: 9rem" src="asset/img/logo/ThrowIT_logo_without_text.png" alt="" />
                        <h1 class="fs-3">Sign In to <span class="text-success">Throw IT</span></h1>
                    </div>
                    <div class="fill__login">
                        <form class="">
                            <div class="row">
                                <div class="mb-3">
                                    <label for="Email" class="form-label fw-medium text-dark">Name</label>
                                    <input type="text" class="form-control" id="name" placeholder="username" />
                                </div>
                                <div class="mb-3">
                                    <label for="Password" class="form-label fw-medium text-dark">Email address</label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        placeholder="name@example.com"
                                    />
                                </div>
                            </div>
                            <button type="submit" class="btn btn-green-outline w-100 rounded-pill fw-bold">
                                LOGIN
                            </button>
                            <img class="w-100 mt-3" src="asset/img/section/login/Line-or.png" alt="" />

                            <div class="brand__login d-flex flex-row gap-2 mb-3">
                                <a
                                    href="https://mail.google.com/mail/"
                                    target="_blank"
                                    class="p-3 w-100 btn-green-outline rounded-3 d-flex justify-content-center align-items-center"
                                >
                                    <i class="fa-brands fa-google"></i>
                                </a>
                                <a
                                    href="https://www.instagram.com/"
                                    target="_blank"
                                    class="p-3 w-100 btn-green-outline rounded-3 d-flex justify-content-center align-items-center"
                                >
                                    <i class="fa-brands fa-instagram"></i>
                                </a>
                                <a
                                    href="https://www.facebook.com/?locale=id_ID"
                                    target="_blank"
                                    class="p-3 w-100 btn-green-outline rounded-3 d-flex justify-content-center align-items-center"
                                >
                                    <i class="fa-brands fa-facebook"></i>
                                </a>
                                <a
                                    href="https://x.com/?lang=id"
                                    target="_blank"
                                    class="p-3 w-100 btn-green-outline rounded-3 d-flex justify-content-center align-items-center"
                                >
                                    <i class="fa-brands fa-twitter"></i>
                                </a>
                            </div>

                            <div class="d-flex flex-row mt-4">
                                <p>New to Throw IT?</p>
                                <a class="ms-1 text-success text-decoration-none fw-bold" href="signUP.html">Sign up</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="asset/plugin/bootstrap/dist/js/bootstrap.min.js"></script>
        <script src="asset/plugin/fontawesome/js/all.min.js"></script>
        <script src="js/script.js"></script>
    </body>
</html>
